name: release

on:
  release:
    types: [published]

jobs:
  build:
    name: Build and upload binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all targets
        run: bun run build:all

      - name: Package tarballs
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          # homebrew-releaser expects: {repo}-{version}-{os}-{arch}.tar.gz
          # where version has no leading 'v'
          VERSION_CLEAN="${VERSION#v}"

          for TARGET in darwin-arm64 darwin-amd64 linux-arm64 linux-amd64; do
            BINARY="dist/winline-${TARGET}"
            ARCHIVE="winline-${VERSION_CLEAN}-${TARGET}.tar.gz"
            tar -czf "${ARCHIVE}" -C dist "winline-${TARGET}"
            echo "Created ${ARCHIVE}"
          done

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION_CLEAN="${VERSION#v}"

          for TARGET in darwin-arm64 darwin-amd64 linux-arm64 linux-amd64; do
            ARCHIVE="winline-${VERSION_CLEAN}-${TARGET}.tar.gz"
            gh release upload "${VERSION}" "${ARCHIVE}"
          done

  homebrew:
    name: Update Homebrew tap
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Release to Homebrew tap
        uses: Justintime50/homebrew-releaser@v3
        with:
          homebrew_owner: gwenwindflower
          homebrew_tap: homebrew-tap
          formula_folder: Formulae
          github_token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          commit_owner: github-actions[bot]
          commit_email: github-actions[bot]@users.noreply.github.com
          install: 'bin.install "winline"'
          test: 'assert_match("usage", shell_output("#{bin}/winline --help 2>&1", 1))'
          target_darwin_amd64: true
          target_darwin_arm64: true
          target_linux_amd64: true
          target_linux_arm64: true
          update_readme_table: true
          skip_commit: false
          debug: false
